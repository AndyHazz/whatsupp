name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy dist for embed
        run: cp -r frontend/dist internal/web/dist

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install CGO cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Run tests
        run: go test ./... -count=1

      - name: Build binaries
        run: |
          # linux/amd64
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-X github.com/andyhazz/whatsupp/internal/version.Version=${GITHUB_REF_NAME}" -o whatsupp-linux-amd64 ./cmd/whatsupp
          tar czf whatsupp-linux-amd64.tar.gz whatsupp-linux-amd64 config.example.yml README.md

          # linux/arm64
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -ldflags="-X github.com/andyhazz/whatsupp/internal/version.Version=${GITHUB_REF_NAME}" -o whatsupp-linux-arm64 ./cmd/whatsupp
          tar czf whatsupp-linux-arm64.tar.gz whatsupp-linux-arm64 config.example.yml README.md

          # linux/armv7 (Raspberry Pi OS 32-bit)
          CGO_ENABLED=1 GOOS=linux GOARCH=arm GOARM=7 CC=arm-linux-gnueabihf-gcc \
            go build -ldflags="-X github.com/andyhazz/whatsupp/internal/version.Version=${GITHUB_REF_NAME}" -o whatsupp-linux-armv7 ./cmd/whatsupp
          tar czf whatsupp-linux-armv7.tar.gz whatsupp-linux-armv7 config.example.yml README.md

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          echo "ref_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.ref_name }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.ref_name }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            whatsupp-linux-amd64.tar.gz
            whatsupp-linux-arm64.tar.gz
            whatsupp-linux-armv7.tar.gz
          generate_release_notes: true
